<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NBA Champions - New York Knicks</title>
<style>
  :root{
    --knicks-blue:#006BB6;
    --knicks-orange:#F58426;
    --ink:#0b1622;
    --muted:#5b6b7b;
    --line:#e4e9ef;
    --card:#ffffff;
    --bg:#f4f6f9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;
  }
  header{
    background:linear-gradient(135deg,var(--knicks-blue),#0a4f86);
    color:#fff;padding:44px 20px 40px;text-align:center;position:relative;overflow:hidden;
  }
  header::after{
    content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(45deg,transparent,transparent 22px,rgba(245,132,38,.08) 22px,rgba(245,132,38,.08) 24px);
  }
  header .inner{position:relative;z-index:1}
  .crown{font-size:40px;line-height:1}
  header h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-.5px;margin:8px 0 4px}
  header .sub{color:#cfe4f4;font-size:16px}
  .badge{
    display:inline-block;margin-top:16px;background:var(--knicks-orange);color:#231400;
    font-weight:700;font-size:13px;letter-spacing:.4px;text-transform:uppercase;
    padding:7px 16px;border-radius:999px;
  }
  main{max-width:1000px;margin:-24px auto 60px;padding:0 16px;position:relative;z-index:2}
  .meta{
    display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:22px;
  }
  .stat{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px 18px;text-align:center;min-width:130px;box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .stat b{display:block;font-size:22px;color:var(--knicks-blue)}
  .stat span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px}
  .controls button{
    border:1px solid var(--line);background:var(--card);color:var(--muted);
    font-size:12px;font-weight:600;padding:7px 14px;border-radius:999px;cursor:pointer;
    text-transform:uppercase;letter-spacing:.4px;transition:all .12s;
  }
  .controls button:hover{border-color:var(--knicks-blue);color:var(--knicks-blue)}
  .controls button.active{background:var(--knicks-blue);color:#fff;border-color:var(--knicks-blue)}
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;
  }
  .player{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:transform .12s,box-shadow .12s;
    border-top:4px solid var(--knicks-orange);
  }
  .player:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,107,182,.14)}
  .head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .num{
    font-size:12px;font-weight:700;color:var(--knicks-orange);
  }
  .posbadge{
    font-size:11px;font-weight:700;color:#fff;background:var(--knicks-blue);
    padding:3px 9px;border-radius:6px;white-space:nowrap;
  }
  .name{font-size:18px;font-weight:700;margin:2px 0 12px}
  .rows{display:flex;gap:8px;margin-bottom:10px}
  .cell{flex:1;background:var(--bg);border-radius:8px;padding:8px 6px;text-align:center}
  .cell span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .cell b{font-size:17px;color:var(--knicks-blue)}
  .subline{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);
    border-top:1px dashed var(--line);padding-top:8px;margin-top:2px}
  .subline span b{color:var(--ink);font-weight:700}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:0 20px 40px}
  footer a{color:var(--knicks-blue)}
  table.legend{margin:0 auto;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="inner">
    <div class="crown">🏆</div>
    <h1>New York Knicks</h1>
    <div class="sub">2026 NBA Champions &nbsp;·&nbsp; def. San Antonio Spurs 4-1</div>
    <div class="badge">Finals MVP: Jalen Brunson</div>
  </div>
</header>

<main>
  <div class="meta">
    <div class="stat"><b id="s-count">-</b><span>Players</span></div>
    <div class="stat"><b id="s-tall">-</b><span>Tallest</span></div>
    <div class="stat"><b id="s-avg">-</b><span>Avg Height</span></div>
    <div class="stat"><b>3rd</b><span>NBA Title</span></div>
  </div>

  <div class="controls" id="controls">
    <button data-sort="NUM" class="active">Jersey #</button>
    <button data-sort="PTS">Points</button>
    <button data-sort="REB">Rebounds</button>
    <button data-sort="AST">Assists</button>
    <button data-sort="HEIGHT_IN">Height</button>
  </div>

  <div class="grid" id="roster"></div>
</main>

<footer>
  Roster data via <a href="https://github.com/swar/nba_api" target="_blank" rel="noopener">nba_api</a> · 2025-26 season.
  Championship result via NBA.com &amp; ESPN.
</footer>

<script src="nba_data.js"></script>
<script>
// Roster + stats are NOT hard-coded here: they come from the shared nba_data.js
// dataset (the same file index.html uses), so this page updates when the data is regenerated.
const ROOT = window.NBA_DATA;
// Pick the season the Knicks won the title (falls back to the newest season if none flagged).
const season = ROOT.seasons.find(s => ROOT.data[s] && ROOT.data[s].NYK && ROOT.data[s].NYK.champion) || ROOT.seasons[0];
const roster = ROOT.data[season].NYK.players;   // [{id,name,num,pos,height,weight,age,s}]

const toInches = h => { if(!h||h.indexOf('-')<0) return 0; const [f,i]=h.split('-').map(Number); return f*12+i; };
const fmt = inch => `${Math.floor(inch/12)}-${inch%12}`;
const pct = v => v==null ? '-' : (v*100).toFixed(1)+'%';

const grid = document.getElementById('roster');
// Render a list of players as cards (position, height, and per-game stats).
function render(list){
  grid.innerHTML = list.map(p => {
    const s = p.s || {};                          // s is null for players with no games
    return `
    <div class="player">
      <div class="head">
        <div class="num">#${p.num || '-'}</div>
        <div class="posbadge">${p.pos} · ${p.height}</div>
      </div>
      <div class="name">${p.name}</div>
      <div class="rows">
        <div class="cell"><span>PTS</span><b>${s.PTS??'-'}</b></div>
        <div class="cell"><span>REB</span><b>${s.REB??'-'}</b></div>
        <div class="cell"><span>AST</span><b>${s.AST??'-'}</b></div>
      </div>
      <div class="subline">
        <span>GP <b>${s.GP??'-'}</b></span>
        <span>MIN <b>${s.MIN??'-'}</b></span>
        <span>FG <b>${pct(s.FG_PCT)}</b></span>
        <span>3P <b>${pct(s.FG3_PCT)}</b></span>
      </div>
    </div>`;
  }).join('');
}

// Sort by jersey # (asc), height (desc), or a per-game stat (desc), then re-render.
function sortBy(key){
  const list = [...roster].sort((a,b)=>{
    if(key==='NUM') return (parseInt(a.num||'999')||999)-(parseInt(b.num||'999')||999);
    if(key==='HEIGHT_IN') return toInches(b.height)-toInches(a.height);
    return ((b.s&&b.s[key])??-1)-((a.s&&a.s[key])??-1);
  });
  render(list);
}

document.getElementById('controls').addEventListener('click', e=>{
  if(e.target.tagName!=='BUTTON') return;
  document.querySelectorAll('#controls button').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  sortBy(e.target.dataset.sort);
});

sortBy('NUM');   // default view, sorted by jersey number

// summary tiles, computed from the roster data
document.getElementById('s-count').textContent = roster.length;
const inches = roster.map(p => toInches(p.height)).filter(Boolean);
const tallest = roster.reduce((m,p)=>toInches(p.height)>toInches(m.height)?p:m, roster[0]);
document.getElementById('s-tall').textContent = tallest.height + '"';
document.getElementById('s-avg').textContent = fmt(Math.round(inches.reduce((a,b)=>a+b,0)/inches.length)) + '"';
</script>
</body>
</html>
